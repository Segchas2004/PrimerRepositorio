<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Proyecto</title>
</head>
<body>

  <h1>Cuestionario</h1>

  <p>¿Usas mucho ia?</p>

  <img src="meme.jpeg" alt="Mi imagen" width="300">

  <br><br>

  <button onclick="responder('si')">Sí</button>
  <button onclick="responder('no')">No</button>

  <p id="respuesta"></p>

  <br>

  <script>
    function responder(opcion) {
      if(opcion === 'si') {
        document.getElementById("respuesta").innerText = "ta bueno";
      } else {
        document.getElementById("respuesta").innerText = "Oh wow ";
      }
    }
  </script>

</body>
</html>
