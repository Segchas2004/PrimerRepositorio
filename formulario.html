<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Proyecto</title>
</head>
<body>

  <h1>Cuestionario</h1>

  <p>¿Te gusta Sabrina Carpenter?</p>

  <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Sabrina_Carpenter_2023.jpg" 
       alt="Sabrina Carpenter" width="300">

  <br><br>

  <button onclick="responder('si')">Sí</button>
  <button onclick="responder('no')">No</button>

  <p id="respuesta"></p>

  <br>

  <iframe width="300" height="200"
    src="https://www.youtube.com/embed/aSugSGCC12I"
    frameborder="0" allowfullscreen>
  </iframe>

  <script>
    function responder(opcion) {
      if(opcion === 'si') {
        document.getElementById("respuesta").innerText = "¡Genial!  A ti sí te gusta.";
      } else {
        document.getElementById("respuesta").innerText = "Oh...  No te gusta.";
      }
    }
  </script>

</body>
</html>
